<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="shine" x1="4" y1="4" x2="18" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="heart" x1="10" y1="8" x2="22" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="50%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <radialGradient id="heartSheen" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
    </radialGradient>
    <filter id="heartGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0.5" stdDeviation="1" flood-color="#eab308" flood-opacity="0.35"/>
    </filter>
    <filter id="heartShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0.3" dy="0.5" stdDeviation="0.4" flood-color="#1e1b4b" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="url(#bg)"/>
  <rect x="2" y="2" width="28" height="28" rx="7" fill="url(#shine)"/>
  <!-- Heart glow -->
  <path d="M16 25.5 C14 23.5, 6.5 18, 6.5 12.5 C6.5 9.5, 9 7.5, 11.5 7.5 C13.5 7.5, 15 8.8, 16 10.5 C17 8.8, 18.5 7.5, 20.5 7.5 C23 7.5, 25.5 9.5, 25.5 12.5 C25.5 18, 18 23.5, 16 25.5 Z"
        fill="#facc15" fill-opacity="0.3" filter="url(#heartGlow)"/>
  <!-- Heart shape -->
  <path d="M16 25.5 C14 23.5, 6.5 18, 6.5 12.5 C6.5 9.5, 9 7.5, 11.5 7.5 C13.5 7.5, 15 8.8, 16 10.5 C17 8.8, 18.5 7.5, 20.5 7.5 C23 7.5, 25.5 9.5, 25.5 12.5 C25.5 18, 18 23.5, 16 25.5 Z"
        fill="url(#heart)" filter="url(#heartShadow)"/>
  <!-- Heart highlight -->
  <path d="M16 25.5 C14 23.5, 6.5 18, 6.5 12.5 C6.5 9.5, 9 7.5, 11.5 7.5 C13.5 7.5, 15 8.8, 16 10.5 C17 8.8, 18.5 7.5, 20.5 7.5 C23 7.5, 25.5 9.5, 25.5 12.5 C25.5 18, 18 23.5, 16 25.5 Z"
        fill="url(#heartSheen)"/>
</svg>
