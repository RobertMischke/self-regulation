<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Rounded-square background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <!-- Subtle top-left highlight for 3D feel -->
    <radialGradient id="sheen" cx="30%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom-right shadow for depth -->
    <radialGradient id="shadow" cx="70%" cy="75%" r="55%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
    <!-- 3D letter: light face -->
    <linearGradient id="letterFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0d4f5"/>
    </linearGradient>
    <!-- 3D letter: shadow/depth layer -->
    <linearGradient id="letterDepth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b0764" stop-opacity="0.8"/>
    </linearGradient>
    <!-- Edge highlight on the rounded square -->
    <linearGradient id="edgeLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ddd6fe" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="100%" stop-color="#581c87" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Main rounded square -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="url(#bgGrad)"/>
  <!-- 3D sheen -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="url(#sheen)"/>
  <!-- Depth shadow -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="url(#shadow)"/>
  <!-- Edge highlight -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="none" stroke="url(#edgeLight)" stroke-width="0.8"/>
  <!-- 3D "R" inset layer 1: deepest shadow (top-left offset) -->
  <text x="14.8" y="23.2" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-weight="bold" font-size="26" fill="#1e1b4b" fill-opacity="0.55">R</text>
  <!-- 3D "R" inset layer 2: mid shadow -->
  <text x="15.2" y="23.6" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-weight="bold" font-size="26" fill="#3b0764" fill-opacity="0.4">R</text>
  <!-- 3D "R" inset layer 3: highlight below-right for carved depth -->
  <text x="16.4" y="24.6" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-weight="bold" font-size="26" fill="#c4b5fd" fill-opacity="0.35">R</text>
  <!-- 3D "R": main face -->
  <text x="15.8" y="24" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-weight="bold" font-size="26" fill="url(#letterFace)">R</text>
</svg>
